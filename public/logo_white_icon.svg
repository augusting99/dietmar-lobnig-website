<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Inner circle -->
  <circle cx="200" cy="200" r="132" fill="none" stroke="#fff" stroke-width="2.5"/>

  <!-- Four-leaf clover built from heart shapes -->
  <g transform="translate(200,200) rotate(30) scale(1.3)" fill="#fff">
    <!-- Top-left leaf -->
    <g transform="rotate(-45)">
      <path d="M 0,0 C -14,-12 -42,-42 -28,-60 C -14,-78 0,-55 0,-55 C 0,-55 14,-78 28,-60 C 42,-42 14,-12 0,0 Z"/>
    </g>
    <!-- Top-right leaf -->
    <g transform="rotate(45)">
      <path d="M 0,0 C -14,-12 -42,-42 -28,-60 C -14,-78 0,-55 0,-55 C 0,-55 14,-78 28,-60 C 42,-42 14,-12 0,0 Z"/>
    </g>
    <!-- Bottom-left leaf -->
    <g transform="rotate(-135)">
      <path d="M 0,0 C -14,-12 -42,-42 -28,-60 C -14,-78 0,-55 0,-55 C 0,-55 14,-78 28,-60 C 42,-42 14,-12 0,0 Z"/>
    </g>
    <!-- Bottom-right leaf -->
    <g transform="rotate(135)">
      <path d="M 0,0 C -14,-12 -42,-42 -28,-60 C -14,-78 0,-55 0,-55 C 0,-55 14,-78 28,-60 C 42,-42 14,-12 0,0 Z"/>
    </g>
    <!-- Stem with slight bend -->
    <path d="M -1,8 C 1,22 -2,40 -5,55 C -6,62 -8,70 -6,72 C -4,74 -2,72 0,68 C 3,60 4,45 2,30 C 1,20 0,12 -1,8 Z"/>
  </g>
</svg>